<div style="margin-top: 0px;" class="input-block-level weee field" data-bind="visible: selectedMethodCode() == 'c2c' || selectedMethodCode() == 'w2c', css: {'_error': error(), '_required': required()}">
    <label class="label label-np-help" data-bind="attr: {for: uid}">
        <span data-bind="i18n: 'House'"></span>
    </label>
    <textarea class="admin__control-textarea" data-bind="
    value: value,
    valueUpdate: valueUpdate,
    hasFocus: focused,
    attr: {
        name: inputName,
        cols: cols,
        rows: rows,
        'aria-describedby': noticeId,
        id: uid,
        disabled: disabled
    }"></textarea>
    <!-- ko if: error() --><div class="mage-error" data-bind="text: error()"></div><!-- /ko -->
</div>
