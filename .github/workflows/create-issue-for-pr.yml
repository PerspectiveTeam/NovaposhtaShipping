name: Create issue for PR

on:
  pull_request_target:
    types: [opened, reopened, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  create-issue-if-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Create issue if PR has no linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = pr.body || '';

            // Примітивна перевірка на вже згадане issue
            const hasIssueRef =
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+/i.test(body) ||
              /#\d+/.test(body);

            if (hasIssueRef) {
              core.info('PR already references an issue');
              return;
            }

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: `Issue for PR #${pr.number}: ${pr.title}`,
              body: [
                `Auto-created issue for PR #${pr.number}.`,
                '',
                `PR: ${pr.html_url}`,
                '',
                'TODO:',
                '- [ ] Review changes',
                '- [ ] Test functionality',
                '- [ ] Update docs if needed'
              ].join('\n'),
              labels: ['from-pr']
            });

            const newBody = [
              body.trim(),
              '',
              `Closes #${issue.data.number}`
            ].join('\n').trim();

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: newBody
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: `Created linked issue: #${issue.data.number}`
            });
